id = "runge_theorem"
title = "Runge's theorem (rational approximation on compact sets in ℂ)"
test = false
module = "LeanEval.ComplexAnalysis.Runge"
holes = ["runge"]
submitter = "Kim Morrison"
notes = "§64 (additional statement 3) of Knill's 'Some Fundamental Theorems in Mathematics'. For a compact K ⊆ ℂ and f analytic on an open neighbourhood U ⊇ K, f is the uniform limit on K of rational functions whose poles avoid K. The submitted version is the basic Runge form (rational approximations with poles in ℂ \\ K), no constraint on pole location within the complement; the sharper pole-control strengthening (one pole per connected component of ℂ \\ K) is the standard refinement but is harder to phrase without further setup. Mathlib has Weierstrass / Stone–Weierstrass for C([a, b], ℝ) and the Bernstein approximation, but nothing for compact-set rational approximation in ℂ; grep -rn 'runge\\|Runge' in mathlib returns no hits. Aristotle closed the single-ball case runge_of_subset_ball sorry-free; the general patch-ball-by-ball step needs Cauchy integral over a general cycle or Hahn–Banach + Riesz, neither in mathlib."
source = "C. Runge, *Zur Theorie der eindeutigen analytischen Funktionen*, Acta Math. 6 (1885), 229-244. Listed as §64 (additional statement 3) in O. Knill, *Some Fundamental Theorems in Mathematics* (https://people.math.harvard.edu/~knill/graphgeometry/papers/fundamental.pdf). I did not find a Lean formalisation."
informal_solution = "Standard proof in two steps. (1) Cauchy representation on a covering chain of small open balls in U: cover K by finitely many balls B_i ⊂ U, on each ball f is given by a convergent Taylor series, hence approximable by polynomials. (2) Mittag-Leffler / pole-shifting: combine the local polynomial approximations into one global rational function by Cauchy integral over a finite cycle that surrounds K inside U \\ K, then shift / push poles to a single representative pole per connected component of ℂ \\ K (the sharper statement). A Hahn–Banach + Riesz duality argument gives the standard textbook proof: density of rational functions in the uniform-norm closure on K is equivalent to the corresponding family of (signed) measures on K annihilating all such rational functions being trivial."
