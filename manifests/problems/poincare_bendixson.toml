id = "poincare_bendixson"
title = "Poincaré–Bendixson theorem"
test = false
module = "LeanEval.Dynamics.PoincareBendixson"
holes = ["poincare_bendixson"]
submitter = "Kim Morrison"
notes = "§63 of Knill's 'Some Fundamental Theorems in Mathematics'. Planar trichotomy: for a C¹ autonomous vector field F : ℝ² → ℝ² and a forward integral curve γ on [0, ∞), one of three alternatives holds — the forward orbit is unbounded; the ω-limit set ⋂ s, closure (γ '' Ici s) contains an equilibrium of F; or the ω-limit set equals the range of a non-constant periodic integral curve. The bounded branch uses 'ω-limit contains an equilibrium' rather than pointwise convergence: planar orbits trapped in a bounded forward-invariant region may accumulate on continua of equilibria or polycycles without converging to a single point. Case 3 requires F (β 0) ≠ 0 so that a constant equilibrium curve does not vacuously satisfy the periodic branch; the conclusion is a non-constant periodic orbit, not the stronger 'limit cycle' (isolated, attracting nearby trajectories) of strict dynamical-systems usage. Mathlib has IsIntegralCurveOn / IsIntegralCurve, the omegaLimit API on Dynamics/, and Picard–Lindelöf local existence; the statement spells out the trajectory ω-limit as ⋂ s, closure (γ '' Ici s). It does not have Poincaré–Bendixson, the Jordan curve theorem in ℝ² (used in the classical proof; the same gap is §48 of Knill), the transverse-arc / first-return-map machinery, or global continuation of C¹ ODE flows."
source = "H. Poincaré, *Mémoire sur les courbes définies par une équation différentielle*, Journal de Mathématiques 7 (1881), 8 (1882), 1 (1885), 2 (1886); I. Bendixson, *Sur les courbes définies par des équations différentielles*, Acta Mathematica 24 (1901), 1-88. Listed as §63 in O. Knill, *Some Fundamental Theorems in Mathematics* (https://people.math.harvard.edu/~knill/graphgeometry/papers/fundamental.pdf). The Isabelle/HOL/AFP entry by Fabian Immler and Yong Kiam Tan (https://www.isa-afp.org/entries/Poincare_Bendixson.html) depends on John Harrison's Jordan curve theorem; I did not find a corresponding Lean formalisation."
informal_solution = "Classical proof: assume the forward orbit is bounded and the ω-limit set contains no equilibrium of F. Pick a regular point p of the ω-limit set and a transverse arc Σ at p. The first-return map P : Σ → Σ along the flow is well-defined and monotone in the natural linear order on Σ. The orbit's intersections with Σ form a monotone sequence converging to p; combined with the Jordan curve theorem (a closed orbit Γ separates ℝ² into bounded interior and unbounded exterior, and trajectories cannot escape across Γ), this forces the ω-limit set to be exactly the range of a periodic integral curve through p. The non-degeneracy F (β 0) ≠ 0 follows from p being a regular point."
