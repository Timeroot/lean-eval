id = "hopf_rinow"
title = "Hopf–Rinow theorem (metric completeness ↔ geodesic completeness)"
test = false
module = "LeanEval.Geometry.HopfRinow"
holes = ["hopf_rinow"]
submitter = "Kim Morrison"
notes = "§93 of Knill's 'Some Fundamental Theorems in Mathematics' (main theorem). For a connected, locally compact Riemannian manifold M, metric completeness and geodesic completeness are equivalent. The file ships two helper definitions: IsGeodesic (a path with locally linear edist — the constant-speed characterisation, equivalent to ∇γ̇γ̇ = 0 on a Riemannian manifold but expressible without the Levi-Civita connection) and IsGeodesicallyComplete (every geodesic on a bounded open interval extends to all of ℝ, Knill's 'the exponential map extends to the whole tangent bundle' re-cast metrically). Mathlib v4.30 has IsRiemannianManifold and riemannianEDist / pathELength (Gouëzel 2025), but no Geodesic / expMap / IsGeodesicallyComplete, no Levi-Civita connection (in-flight via the placeholder PR #36036, WIP), and no Hopf–Rinow theorem (grep -ri hopf.*rinow returns no hits). Local compactness is essential: Hopf–Rinow fails for infinite-dimensional Riemannian Hilbert manifolds (Atkin 1975). Connectedness is added to match the standard formulation and ensure riemannianEDist is everywhere finite-valued."
source = "H. Hopf and W. Rinow, *Ueber den Begriff der vollständigen differentialgeometrischen Fläche*, Comment. Math. Helv. 3 (1931), 209-225. Listed as §93 in O. Knill, *Some Fundamental Theorems in Mathematics* (https://people.math.harvard.edu/~knill/graphgeometry/papers/fundamental.pdf). I did not find a Lean formalisation."
informal_solution = "Standard Hopf–Rinow proof. Metric ⇒ geodesic completeness: given a geodesic γ : (a, b) → M, the limit lim_{t → b⁻} γ(t) exists by metric completeness because γ is a (uniformly) Cauchy net (constant-speed implies edist (γ s) (γ t) = c · |s − t|). Local extension at the limit uses local existence of geodesics from the limit point (Picard–Lindelöf applied to the geodesic equation). Geodesic ⇒ metric completeness: in the locally compact case, Hopf–Rinow's central lemma is that closed bounded subsets are compact (the Heine–Borel property in the Riemannian setting). Given a Cauchy sequence in M, it lies in a bounded subset; geodesic completeness lets us join any two points by a length-minimising geodesic of length equal to their distance (Hopf–Rinow's existence statement), exhibiting the Cauchy sequence as one in a compact set, hence convergent."
